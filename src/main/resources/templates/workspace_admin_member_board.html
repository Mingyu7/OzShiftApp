<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${workspace.name} + ' - 멤버별 스케줄 보드'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .board-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 30px;
        }
        .table th { background-color: #f1f3f5; text-align: center; vertical-align: middle; }
        .table td { vertical-align: top; height: 100px; min-width: 120px; }
        .member-col { background-color: #f8f9fa; font-weight: bold; width: 150px; text-align: center; vertical-align: middle !important; }
        .shift-card {
            background-color: #e7f5ff;
            border-left: 4px solid #339af0;
            padding: 5px 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .date-header { font-size: 0.9rem; color: #495057; }
        .today-highlight { background-color: #fff9db !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">OzShift 🇦🇺 (Manager)</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                 <li class="nav-item me-3">
                    <a class="nav-link" href="/"> &larr; 대시보드</a>
                </li>
                <li class="nav-item me-3">
                    <span class="navbar-text text-white" th:text="${realName} + '님 (Manager)'"></span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="m-0 d-grid">
                        <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0" th:text="${workspace.name} + ' 멤버별 주간 스케줄'">Workspace Board</h3>
        
        <div class="btn-group">
            <a th:href="@{/workspace/{id}/admin/board(id=${workspace.id}, weekOffset=${weekOffset - 1})}" class="btn btn-outline-secondary btn-sm">&larr; 이전 주</a>
            <a th:href="@{/workspace/{id}/admin/board(id=${workspace.id}, weekOffset=0)}" class="btn btn-outline-primary btn-sm">이번 주</a>
            <a th:href="@{/workspace/{id}/admin/board(id=${workspace.id}, weekOffset=${weekOffset + 1})}" class="btn btn-outline-secondary btn-sm">다음 주 &rarr;</a>
        </div>

        <div>
            <a th:href="@{/workspace/{id}/admin(id=${workspace.id})}" class="btn btn-sm btn-info text-white">📅 달력으로 보기</a>
            <a th:href="@{/workspace/{id}/shift/add(id=${workspace.id})}" class="btn btn-sm btn-primary">+ 스케줄 추가</a>
        </div>
    </div>

    <div class="board-container shadow-sm">
        <div class="table-responsive">
            <table class="table table-bordered mb-0">
                <thead>
                    <tr>
                        <th class="member-col">직원명</th>
                        <th th:each="date : ${weekDates}" 
                            th:classappend="${date.equals(T(java.time.LocalDate).now())} ? 'today-highlight' : ''">
                            <div class="date-header" th:text="${#temporals.format(date, 'E')}">Mon</div>
                            <div th:text="${#temporals.format(date, 'MM/dd')}">01/01</div>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="member : ${members}">
                        <td class="member-col" th:text="${member.user.name}">Member Name</td>
                        <td th:each="date : ${weekDates}" 
                            th:classappend="${date.equals(T(java.time.LocalDate).now())} ? 'today-highlight' : ''">
                            <!-- 이 멤버의 해당 날짜 시프트들 필터링 -->
                            <div th:each="shift : ${shifts}" 
                                 th:if="${shift.user.id == member.user.id && shift.startTime.toLocalDate().equals(date)}">
                                <div class="shift-card">
                                    <div class="fw-bold">
                                        <span th:text="${#temporals.format(shift.startTime, 'HH:mm')}">09:00</span> - 
                                        <span th:text="${#temporals.format(shift.endTime, 'HH:mm')}">17:00</span>
                                    </div>
                                    <div class="small text-muted" th:text="'$' + ${shift.hourlyRate} + '/hr'">$25/hr</div>
                                    <div class="mt-1">
                                        <a th:href="@{/workspace/{wid}/shift/edit/{sid}(wid=${workspace.id}, sid=${shift.id})}" class="text-primary text-decoration-none" style="font-size: 0.75rem;">수정</a>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${members.isEmpty()}">
                        <td colspan="8" class="text-center py-5 text-muted">등록된 직원이 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
