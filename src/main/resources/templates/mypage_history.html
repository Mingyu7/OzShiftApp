<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 근무 기록 - OzShift</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .table-card { border: none; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table-responsive { border-radius: 0 0 20px 20px; }
        .badge { font-weight: 500; font-size: 0.8rem; padding: 6px 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">OzShift 🇦🇺</a>
        <div class="ms-auto">
            <a href="/mypage" class="btn btn-outline-light btn-sm">마이페이지</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold m-0"><i class="bi bi-clock-history text-primary"></i> 전체 근무 기록</h2>
            <p class="text-muted m-0" th:text="${user.name} + '님의 모든 근무 내역입니다.'">홍길동님의 모든 근무 내역입니다.</p>
        </div>
        <button class="btn btn-success shadow-sm rounded-pill px-4"><i class="bi bi-file-earmark-excel me-2"></i> 내역 다운로드</button>
    </div>

    <div class="card table-card overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr class="text-muted" style="font-size: 0.9rem;">
                    <th class="ps-4">날짜</th>
                    <th>워크스페이스</th>
                    <th>근무 시간</th>
                    <th>위치 정보</th>
                    <th>승인 상태</th>
                    <th class="pe-4 text-end">작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${records}">
                    <td class="ps-4">
                        <div class="fw-semibold" th:text="${#temporals.format(record.startTime, 'yyyy-MM-dd')}">2026-02-20</div>
                    </td>
                    <td>
                        <span class="fw-bold" th:text="${record.workspace.name}">Sydney Cafe</span>
                    </td>
                    <td>
                        <span th:text="${#temporals.format(record.startTime, 'HH:mm')}">09:00</span>
                        <span th:if="${record.endTime != null}" th:text="' ~ ' + ${#temporals.format(record.endTime, 'HH:mm')}"> ~ 17:00</span>
                        <span th:if="${record.endTime == null}" class="text-primary small fw-bold ms-2">진행 중</span>
                    </td>
                    <td>
                        <small class="text-muted d-block">시작: <span th:text="${record.startLatitude} + ', ' + ${record.startLongitude}">위치</span></small>
                        <small class="text-muted d-block" th:if="${record.endLatitude != null}">종료: <span th:text="${record.endLatitude} + ', ' + ${record.endLongitude}">위치</span></small>
                    </td>
                    <td>
                        <span th:if="${record.status.name() == 'PENDING'}" class="badge bg-warning text-dark">대기중</span>
                        <span th:if="${record.status.name() == 'APPROVED'}" class="badge bg-success">승인됨</span>
                        <span th:if="${record.status.name() == 'REJECTED'}" class="badge bg-danger">거절됨</span>
                    </td>
                    <td class="pe-4 text-end">
                        <button class="btn btn-sm btn-outline-secondary rounded-circle" title="상세 정보"><i class="bi bi-info-circle"></i></button>
                    </td>
                </tr>
                <tr th:if="${records == null or records.isEmpty()}">
                    <td colspan="6" class="text-center py-5 text-muted">근무 기록이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
