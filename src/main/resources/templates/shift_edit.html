<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스케줄 수정 - OzShift</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 550px; margin: 60px auto; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%); padding: 25px; border: none; }
        .card-header h4 { font-weight: 700; letter-spacing: -0.5px; color: #212529; }
        .card-body { padding: 40px; }
        .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control, .form-select { 
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid #dee2e6; 
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #fd7e14;
            box-shadow: 0 0 0 4px rgba(253, 126, 20, 0.1);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 10px 0 0 10px;
            border-right: none;
            color: #6c757d;
        }
        .has-icon .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .btn-warning { 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 600; 
            background: #ffc107;
            border: none;
            transition: transform 0.2s;
        }
        .btn-warning:hover { transform: translateY(-2px); background: #e0a800; }
        .btn-light { padding: 12px; border-radius: 10px; font-weight: 600; color: #6c757d; }
        .workspace-badge {
            background-color: rgba(0,0,0,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #212529;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-2"><i class="bi bi-pencil-square me-2"></i>근무 일정 수정</h4>
                <span class="workspace-badge">
                    <i class="bi bi-geo-alt-fill me-1"></i>
                    <span th:text="${workspace.name}">Workspace Name</span>
                </span>
            </div>
            <div class="card-body">
                <form th:action="@{/workspace/{wid}/shift/update/{sid}(wid=${workspace.id}, sid=${shift.id})}" method="post">
                    
                    <div class="mb-4">
                        <label for="memberId" class="form-label">근무자 변경</label>
                        <div class="input-group has-icon">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <select class="form-select" id="memberId" name="memberId" required>
                                <option th:each="member : ${members}" 
                                        th:value="${member.id}" 
                                        th:text="${member.user.name} + ' (' + ${member.user.email} + ')'"
                                        th:selected="${member.user.id == shift.user.id}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="startTime" class="form-label">시작 시간</label>
                            <input type="datetime-local" class="form-control" id="startTime" name="startTime" 
                                   th:value="${shift.startTime}" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="endTime" class="form-label">종료 시간</label>
                            <input type="datetime-local" class="form-control" id="endTime" name="endTime" 
                                   th:value="${shift.endTime}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="hourlyRate" class="form-label">시급 (AUD)</label>
                        <div class="input-group has-icon">
                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" step="0.01" class="form-control" id="hourlyRate" name="hourlyRate" 
                                   th:value="${shift.hourlyRate}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-5">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save me-2"></i>변경사항 저장하기
                        </button>
                        <a th:href="@{/workspace/{id}/shift/list(id=${workspace.id})}" class="btn btn-light text-muted">
                            <i class="bi bi-arrow-left me-2"></i>수정 취소
                        </a>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">© 2026 OzShift App. All rights reserved.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
