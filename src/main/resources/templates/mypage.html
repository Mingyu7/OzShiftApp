<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - OzShift</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; }
        .profile-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .profile-header { background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%); padding: 60px 20px; color: white; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; background-color: white; border-radius: 50%; margin: -50px auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #0d6efd; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .info-label { color: #6c757d; font-size: 0.85rem; margin-bottom: 2px; }
        .info-value { font-weight: 600; color: #343a40; margin-bottom: 15px; }
        .section-title { font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; }
        .section-title i { margin-right: 10px; color: #0d6efd; }
        .record-card { transition: all 0.2s; border: 1px solid #edf2f7; border-radius: 12px; }
        .record-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">OzShift 🇦🇺</a>
        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">홈으로</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row">
        <!-- Profile Info -->
        <div class="col-lg-4 mb-4">
            <div class="profile-card bg-white">
                <div class="profile-header">
                    <h4 class="m-0 fw-bold" th:text="${user.name}">홍길동</h4>
                    <p class="mb-0 opacity-75" th:text="${user.role}">MANAGER</p>
                </div>
                <div class="profile-avatar">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="card-body px-4 pt-0 pb-4">
                    <div class="text-center mb-4">
                        <span th:if="${user.role == 'MANAGER'}" class="badge bg-primary-subtle text-primary border border-primary px-3 py-2 rounded-pill">관리자</span>
                        <span th:if="${user.role == 'STAFF'}" class="badge bg-info-subtle text-info border border-info px-3 py-2 rounded-pill">직원</span>
                    </div>
                    
                    <div class="info-label">이메일</div>
                    <div class="info-value" th:text="${user.email}">user@example.com</div>
                    
                    <div class="info-label">가입된 워크스페이스</div>
                    <div class="info-value">현재 소속된 방 (수정 필요)</div>

                    <hr class="my-4 opacity-10">
                    
                    <button class="btn btn-outline-primary w-100 rounded-pill mb-2">프로필 수정</button>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-light w-100 rounded-pill text-danger">로그아웃</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Recent Records -->
        <div class="col-lg-8">
            <div class="card profile-card bg-white p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="section-title m-0"><i class="bi bi-clock-history"></i> 최근 근무 기록 (5개)</h5>
                    <a th:href="@{/mypage/history}" class="btn btn-link text-decoration-none">전체 보기 <i class="bi bi-arrow-right"></i></a>
                </div>

                <div th:if="${recentRecords == null or recentRecords.isEmpty()}" class="text-center py-5 text-muted">
                    <i class="bi bi-calendar-x display-4 mb-3 d-block"></i>
                    아직 근무 기록이 없습니다.
                </div>

                <div class="row g-3" th:if="${recentRecords != null and !recentRecords.isEmpty()}">
                    <div class="col-12" th:each="record : ${recentRecords}">
                        <div class="record-card p-3 bg-white">
                            <div class="row align-items-center">
                                <div class="col-auto">
                                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                                        <i class="bi bi-briefcase text-primary"></i>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="fw-bold" th:text="${record.workspace.name}">Sydney Cafe</div>
                                    <div class="small text-muted">
                                        <span th:text="${#temporals.format(record.startTime, 'yyyy-MM-dd HH:mm')}">2026-02-20 09:00</span>
                                        <span th:if="${record.endTime != null}" th:text="' ~ ' + ${#temporals.format(record.endTime, 'HH:mm')}"> ~ 17:00</span>
                                    </div>
                                </div>
                                <div class="col-auto text-end">
                                    <span th:if="${record.status.name() == 'PENDING'}" class="badge bg-warning-subtle text-warning border border-warning rounded-pill px-3">대기</span>
                                    <span th:if="${record.status.name() == 'APPROVED'}" class="badge bg-success-subtle text-success border border-success rounded-pill px-3">승인</span>
                                    <span th:if="${record.status.name() == 'REJECTED'}" class="badge bg-danger-subtle text-danger border border-danger rounded-pill px-3">거절</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
