<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스케줄 추가 - OzShift</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 550px; margin: 60px auto; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #0d6efd 0%, #0046b5 100%); padding: 25px; border: none; }
        .card-header h4 { font-weight: 700; letter-spacing: -0.5px; }
        .card-body { padding: 40px; }
        .form-label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control, .form-select { 
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid #dee2e6; 
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 10px 0 0 10px;
            border-right: none;
            color: #6c757d;
        }
        .has-icon .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .btn-primary { 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 600; 
            background: #0d6efd;
            border: none;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); background: #0056b3; }
        .btn-light { padding: 12px; border-radius: 10px; font-weight: 600; color: #6c757d; }
        .workspace-badge {
            background-color: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="card">
            <div class="card-header text-white text-center">
                <h4 class="mb-2"><i class="bi bi-calendar-plus me-2"></i>새 근무 일정 등록</h4>
                <span class="workspace-badge">
                    <i class="bi bi-geo-alt-fill me-1"></i>
                    <span th:text="${workspace.name}">Workspace Name</span>
                </span>
            </div>
            <div class="card-body">
                <form th:action="@{/workspace/{id}/shift/add(id=${workspace.id})}" method="post">
                    
                    <div class="mb-4">
                        <label for="memberId" class="form-label">근무자 선택</label>
                        <div class="input-group has-icon">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <select class="form-select" id="memberId" name="memberId" required>
                                <option value="" disabled selected>직원을 선택하세요</option>
                                <option th:each="member : ${members}" 
                                        th:value="${member.id}" 
                                        th:text="${member.user.name} + ' (' + ${member.user.email} + ')'"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="startTime" class="form-label">시작 시간</label>
                            <input type="datetime-local" class="form-control" id="startTime" name="startTime" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="endTime" class="form-label">종료 시간</label>
                            <input type="datetime-local" class="form-control" id="endTime" name="endTime" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="hourlyRate" class="form-label">시급 (AUD)</label>
                        <div class="input-group has-icon">
                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" step="0.01" class="form-control" id="hourlyRate" name="hourlyRate" placeholder="예: 28.50" required>
                        </div>
                        <div class="form-text mt-2 text-muted small">
                            <i class="bi bi-info-circle me-1"></i> 호주 법정 최저시급을 확인하세요.
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-5">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>스케줄 저장하기
                        </button>
                        <a href="/" class="btn btn-light text-muted">
                            <i class="bi bi-x-lg me-2"></i>취소하고 돌아가기
                        </a>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">© 2026 OzShift App. All rights reserved.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
